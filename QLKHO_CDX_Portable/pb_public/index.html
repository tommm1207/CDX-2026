<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1B5E20">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QL Kho CDX">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <title>Hệ Thống Quản Lý CDX</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./logo-banner.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@latest/dist/pocketbase.umd.js"></script>
  <script type="module" crossorigin src="./assets/main-DcvyMAqH.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/main-CN2Yh9G3.css">
</head>

<body class="bg-light">
    <!-- Network Status Indicator -->
    <div id="network-status" class="position-fixed top-0 end-0 m-2 badge bg-success d-none" style="z-index: 9999; font-size: 10px;">
        <i class="fas fa-signal me-1"></i> <span id="status-text">Đang trực tuyến</span>
    </div>

    <div id="loading-overlay">
        <div class="loader-container">
            <i class="fas fa-hourglass-half loader-icon"></i>
            <div class="loader-text">Đang xử lý dữ liệu...</div>
        </div>
    </div>

    <div id="login-container" class="d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-card p-4 p-md-5">
            <div class="text-center mb-4">
                <img src="./logo-banner.jpg"
                    alt="CDX Logo" class="login-logo mb-3">
                <h5 class="text-uppercase fw-bold text-success ls-1">Hệ Thống Quản Lý</h5>
            </div>
            <form id="form-login">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control rounded-3" id="username" placeholder="ID" required>
                    <label>Mã nhân viên (ID)</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control rounded-3" id="password" placeholder="Pass" required>
                    <label>Mật khẩu</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg fw-bold rounded-3 shadow-sm gradient-btn">ĐĂNG
                        NHẬP</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app-container" class="d-none">
        <nav class="navbar navbar-expand navbar-dark fixed-top shadow-sm main-navbar">
            <div class="container-fluid px-3">
                <div class="d-flex align-items-center">
                    <button id="manual-sidebar-btn" type="button" class="btn text-white me-3 border-0"
                        aria-label="Toggle Sidebar">
                        <i class="fas fa-bars fa-lg"></i>
                    </button>
                    <a class="navbar-brand d-flex align-items-center gap-2" href="#"
                        onclick="syncAllData(event)" title="Bấm để đồng bộ dữ liệu">
                        <img src="./logo-banner.jpg" id="logo-sync-img"
                            alt="Logo" height="32" class="bg-white rounded-1 p-1">
                        <span class="fw-bold fs-6">QUẢN LÝ KHO CDX</span>
                    </a>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <button id="manual-home-btn" type="button"
                        class="btn p-0 nav-item-icon text-white-50 hover-white border-0"
                        onclick="switchTab('dashboard', null)" title="Trang chủ" aria-label="Trang chủ">
                        <i class="fas fa-home fa-lg"></i>
                    </button>
                    <div class="dropdown">
                        <button
                            class="btn btn-link text-white text-decoration-none dropdown-toggle fw-bold d-flex align-items-center gap-2"
                            type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span class="avatar-circle"><i class="fas fa-user"></i></span>
                            <span id="user-display-name" class="d-none d-md-block">User</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-3 mt-2">
                            <li><button type="button" class="dropdown-item py-2" onclick="viewProfile()"><i
                                        class="fas fa-id-badge me-2 text-primary"></i>Hồ sơ của tôi</button></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><button type="button" class="dropdown-item py-2 text-danger fw-bold"
                                    onclick="doLogout()"><i class="fas fa-sign-out-alt me-2"></i>Đăng xuất</button></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <div class="offcanvas offcanvas-start border-0" tabindex="-1" id="sidebarMenu" data-bs-backdrop="false">
            <div class="offcanvas-body p-0"></div>
        </div>

        <main class="main-content">
            <div id="tab-dashboard" class="content-tab"></div>
            <div id="tab-generic" class="content-tab d-none h-100">
                <div class="card border-0 shadow-sm rounded-4 h-100 overflow-hidden">
                    <div
                        class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
                        <h5 id="page-title" class="fw-bold text-success mb-0 d-flex align-items-center gap-2">
                            <i class="fas fa-table"></i> Danh sách
                        </h5>
                        <div id="extra-btn-area"></div>
                    </div>
                    <div class="card-body card-body-table p-0 d-flex flex-column bg-light">
                        <div id="filter-bar-wrap" class="flex-shrink-0"></div>
                        <div class="table-viewport flex-grow-1 d-flex flex-column min-h-0">
                            <div id="filter-area" class="filter-area-sticky px-3 px-md-4 py-2 py-md-3 bg-white border-bottom flex-shrink-0"></div>
                            <div class="table-responsive table-scroll flex-grow-1 min-h-0">
                                <table class="table table-hover table-striped mb-0 custom-table" id="data-table">
                                    <thead class="bg-success text-white thead-sticky"></thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Detail Page View (thay thế SweetAlert popup) -->
            <div id="tab-detail" class="content-tab d-none">
                <div class="detail-page-header" id="detail-page-header">
                    <button class="btn btn-sm text-white p-1 border-0" onclick="closeDetailView()" title="Quay lại" style="font-size:16px;min-width:32px"><i class="fas fa-arrow-left"></i></button>
                    <span class="detail-page-title" id="detail-page-title"><i class="fas fa-info-circle me-1"></i>Chi tiết</span>
                    <button class="btn btn-sm text-white p-1 border-0" onclick="closeDetailView(); switchTab('dashboard', null)" title="Home" style="font-size:14px;min-width:32px"><i class="fas fa-home"></i></button>
                </div>
                <div class="detail-page-body" id="detail-page-body"></div>
                <div class="detail-page-footer" id="detail-page-footer"></div>
            </div>

            <!-- Page-View Form (thay modal/Swal) -->
            <div id="tab-form" class="content-tab d-none">
                <div class="detail-page-header" id="form-page-header">
                    <button class="btn btn-sm text-white p-1 border-0" onclick="closeFormView()" title="Quay lại" style="font-size:16px;min-width:32px"><i class="fas fa-arrow-left"></i></button>
                    <span class="detail-page-title" id="form-page-title">Thêm mới</span>
                    <button class="btn btn-sm text-white p-1 border-0" onclick="closeFormView(); switchTab('dashboard', null)" title="Home" style="font-size:14px;min-width:32px"><i class="fas fa-home"></i></button>
                </div>
                <div class="detail-page-body" id="form-page-body" style="padding:12px;"></div>
                <div class="detail-page-footer" id="form-page-footer"></div>
            </div>
        </main>

        <footer class="footer-bar">
            <span>Hệ thống quản lý Con Đường Xanh CDX &copy; 2025</span>
        </footer>

    </div>

    <!-- Bottom Navigation: PHẢI nằm ngoài app-container để luôn trên mọi modal/popup -->
    <nav class="mobile-bottom-nav d-none" id="bottom-nav">
        <button class="nav-item" data-tab="nhansu" onclick="switchBottomTab('nhansu', this)">
            <i class="fas fa-users"></i><span>Nhân sự</span>
        </button>
        <button class="nav-item active" data-tab="home" onclick="switchBottomTab('home', this)">
            <i class="fas fa-home"></i><span>Home</span>
        </button>
        <button class="nav-item" data-tab="baocao" onclick="switchBottomTab('baocao', this)">
            <i class="fas fa-chart-bar"></i><span>Báo cáo</span>
        </button>
        <button class="nav-item" data-tab="lich" onclick="switchBottomTab('lich', this)">
            <i class="fas fa-calendar-alt"></i><span>Lịch</span>
        </button>
    </nav>

    <!-- FAB Button -->
    <button type="button" id="fab-add" class="fab-button d-none" onclick="fabAddAction()" aria-label="Thêm mới">
        <i class="fas fa-plus"></i>
    </button>

    <!-- PWA Cài đặt App -->
    <div id="pwa-install-banner" class="d-none position-fixed start-0 end-0 bg-success text-white shadow-lg" style="z-index: 100000; bottom: 56px; padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));">
        <div class="d-flex align-items-center gap-2">
            <i class="fas fa-download fa-lg flex-shrink-0"></i>
            <div class="flex-grow-1" style="font-size: 12px; line-height: 1.4;">
                <strong>Cài đặt ứng dụng</strong><br>
                <span id="pwa-install-msg">Dùng offline & truy cập nhanh</span>
            </div>
            <button type="button" id="pwa-install-btn" class="btn btn-light btn-sm fw-bold flex-shrink-0" onclick="showInstallPrompt()">Cài đặt</button>
            <button type="button" class="btn-close btn-close-white flex-shrink-0" onclick="dismissInstallBanner()" aria-label="Đóng"></button>
        </div>
    </div>

    <div class="modal fade" id="dataModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content border-0">
                <div class="modal-header bg-success text-white py-2">
                    <h5 class="modal-title fw-bold" id="modalTitle" style="font-size:15px">Thông tin</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body bg-light px-3 py-3" style="overflow-y:auto">
                    <form id="dynamic-form" class="row g-3">
                        <!-- Form fields will be injected here -->
                    </form>
                </div>
                <div class="modal-footer bg-white border-top py-2">
                    <button type="button" class="btn btn-light rounded-pill px-4 fw-bold text-muted"
                        data-bs-dismiss="modal">Hủy bỏ</button>
                    <button type="submit" form="dynamic-form"
                        class="btn btn-success rounded-pill px-4 fw-bold shadow-sm" onclick="submitData()">Lưu dữ
                        liệu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
</body>

</html>
